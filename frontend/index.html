<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>StudySpace - Login</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container narrow">
    <header>
      <h1>StudySpace</h1>
      <p>Serverless Study Room Booking System</p>
    </header>

    <div class="card auth-card">
      <div class="tabs">
        <button id="loginTab" class="tab active" type="button">Login</button>
        <button id="signupTab" class="tab" type="button">Sign Up</button>
      </div>

      <form id="loginForm" class="auth-form">
        <label>Student ID</label>
        <input type="text" id="loginStudentId" placeholder="Enter your student ID" required />
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter your password" required />
        <button type="submit">Login</button>
      </form>

      <form id="signupForm" class="auth-form hidden">
        <label>Full Name</label>
        <input type="text" id="signupName" placeholder="Enter your full name" required />
        <label>Student ID</label>
        <input type="text" id="signupStudentId" placeholder="Choose your student ID" required />
        <label>Password <span class="hint">(8+ chars, 1 uppercase, 1 number, 1 special)</span></label>
        <input type="password" id="signupPassword" placeholder="Create a strong password" required />
        <button type="submit">Create Account</button>
      </form>
    </div>
  </div>

  <script src="auth.js"></script>
</body>
</html>
